name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    env:
      DOTNET_VERSION: "10.0.x"
      PROJECT_PATH: src/WSL2Compactor/WSL2Compactor.csproj
      PUBLISH_DIR: .build/publish
      RELEASE_DIR: .build/release
      ASSET_NAME: WSL2Compactor-win-x64.exe
      MAX_EXE_SIZE_BYTES: "26214400"

    steps:
      - name: Resolve release tag
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }

          if ($tag -notmatch '^v.+') {
            throw "Release tag must start with 'v'. Actual: $tag"
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build
        shell: pwsh
        run: dotnet build WSL2Compactor.slnx -c Release

      - name: Verify formatting
        shell: pwsh
        run: dotnet format WSL2Compactor.slnx --verify-no-changes

      - name: Publish win-x64
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:PublishTrimmed=true `
            -p:PublishReadyToRun=false `
            -p:ContinuousIntegrationBuild=true `
            -o $env:PUBLISH_DIR

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path $env:RELEASE_DIR -Force | Out-Null

          $publishedExe = Join-Path $env:PUBLISH_DIR "WSL2Compactor.exe"
          $releaseExe = Join-Path $env:RELEASE_DIR $env:ASSET_NAME
          if (-not (Test-Path $publishedExe)) {
            throw "Published executable not found: $publishedExe"
          }

          Copy-Item $publishedExe $releaseExe -Force
          $releaseSize = (Get-Item $releaseExe).Length
          if ($releaseSize -gt [int64]$env:MAX_EXE_SIZE_BYTES) {
            throw "Release executable is too large: $releaseSize bytes. Limit: $env:MAX_EXE_SIZE_BYTES bytes."
          }

          Push-Location $env:RELEASE_DIR
          $checksumName = "$($env:ASSET_NAME).sha256"
          $hash = Get-FileHash -Algorithm SHA256 $env:ASSET_NAME
          "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), $env:ASSET_NAME |
            Set-Content -Path $checksumName -Encoding ascii
          Pop-Location

          Get-ChildItem $env:RELEASE_DIR | Format-Table Name, Length

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $releaseExe = Join-Path $env:RELEASE_DIR $env:ASSET_NAME
          $checksum = Join-Path $env:RELEASE_DIR "$($env:ASSET_NAME).sha256"
          $releaseNotes = @'
          ## Download

          Download and run `WSL2Compactor-win-x64.exe`.

          ## Files

          - `WSL2Compactor-win-x64.exe`: self-contained Windows x64 executable.
          - `WSL2Compactor-win-x64.exe.sha256`: optional SHA256 checksum.
          '@

          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --repo "${{ github.repository }}" --yes
          }

          gh release create $tag `
            $releaseExe `
            $checksum `
            --repo "${{ github.repository }}" `
            --verify-tag `
            --title "WSL2Compactor $tag" `
            --notes $releaseNotes `
            --generate-notes
